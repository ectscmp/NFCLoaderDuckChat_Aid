<!doctype html>
<html>
    <head>
        <title>Duck Portal</title>
        <style>
            body {
                margin: 0;
                background: #111;
                color: #fff;
                font-family: Arial, sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                text-align: center;
            }
            .box {
                padding: 30px;
                border-radius: 12px;
                background: #1e1e1e;
                box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            }
            h1 {
                margin-bottom: 10px;
            }
            p {
                opacity: 0.7;
            }
        </style>
    </head>
    <body>
        <div class="box">
            <h1>Duck Portal</h1>
            <p>Please place a duck on the portal</p>
        </div>
    </body>
</html>
